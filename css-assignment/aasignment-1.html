<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS | Assignment 1</title>
    </head>
    <body>
        <style>
            body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            margin: 0;
        }
        .container {
            position: relative;
            background: white;
            width: 400px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 8px solid #ccc;
        }
        .header {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff1493;
            color: black;
            padding: 10px 40px;
            width: 200px;
            padding-bottom:30px;
            font-weight: bold;
        }
        </style>
    </body>
